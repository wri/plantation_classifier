schema: '2.0'
stages:
  data_load:
    cmd: python src/stage_data_load.py --config=params.yaml
    deps:
    - path: src/data/clean_ceo_summary.py
      hash: md5
      md5: dad2c4de32840272ce372069ef17a23a
      size: 1804
    - path: src/data/s3_download_sso.py
      hash: md5
      md5: 47066bc755314e22cd6fa4e7a6c25f95
      size: 1471
    - path: src/stage_data_load.py
      hash: md5
      md5: 1f64f345cc1e5b9ff3e0a837132f237a
      size: 1051
    params:
      params.yaml:
        base:
          log_level: INFO
          random_state: 121
        data_load:
          download_data: false
          sso_profile_name: rognstad-dev
          bucket_name: restoration-monitoring
          folder_prefix: plantation-mapping/data/train/
          local_prefix: data/train/
          summary_filename: data/Training_Data.xlsx
          summary_sheetname: CEO_Surveys
          survey_id_column_name: CEO Survey
          ceo_survey_directory: data/ceo-surveys
          data_prefix_list:
          - slope
          - s1
          - s2
          - dem
          - features-ckpt-2023-02-09
          - labels
          ceo_json: src/report/ceo_list.json
          report_output_dir: /report/
    outs:
    - path: src/report/ceo_list.json
      hash: md5
      md5: 9b001395c1665f95968e2750912e33a5
      size: 28
  featureize:
    cmd: python src/stage_featureize.py --config=params.yaml
    deps:
    - path: src/features/prepare_data.py
      hash: md5
      md5: 7c982a94d361a9ad3b9a116a11e6bdbc
      size: 18902
    - path: src/report/ceo_list.json
      hash: md5
      md5: 9b001395c1665f95968e2750912e33a5
      size: 28
    - path: src/stage_featureize.py
      hash: md5
      md5: 7c36c67d519530f4600b0d1625b3e21b
      size: 1926
    params:
      params.yaml:
        base:
          log_level: INFO
          random_state: 121
        data_condition:
          train_filter_features:
            Use?: yes
            Classes: multi
          label_cats:
            Monoculture: 1
            Agroforestry: 2
            Not plantation: 0
            Unknown: 255
          scale_features: true
          test_split: 20
          val_split: 25
          train_data_x: data/train_features/train_X.pkl
          train_data_y: data/train_features/train_y.pkl
          test_data_x: data/test_features/test_X.pkl
          test_data_y: data/test_features/test_y.pkl
          val_data_x: data/val_features/val_X.pkl
          val_data_y: data/val_features/val_y.pkl
        data_load:
          download_data: false
          sso_profile_name: rognstad-dev
          bucket_name: restoration-monitoring
          folder_prefix: plantation-mapping/data/train/
          local_prefix: data/train/
          summary_filename: data/Training_Data.xlsx
          summary_sheetname: CEO_Surveys
          survey_id_column_name: CEO Survey
          ceo_survey_directory: data/ceo-surveys
          data_prefix_list:
          - slope
          - s1
          - s2
          - dem
          - features-ckpt-2023-02-09
          - labels
          ceo_json: src/report/ceo_list.json
          report_output_dir: /report/
    outs:
    - path: data/test_features/test_X.pkl
